<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 220px; padding: 16px; margin: 0; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #1e40af; }
    p { margin: 4px 0; font-size: 12px; color: #475569; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; }
    .status { display: flex; align-items: center; margin-top: 10px; font-size: 12px; font-weight: 600; color: #166534; }
  </style>
</head>
<body>
  <h3>AAO Shopee Helper</h3>
  <p>正在为 AAO 价格工具提供 Shopee 数据</p>
  <div class="status"><span class="dot"></span>运行中</div>
  <p style="margin-top:10px;color:#94a3b8;font-size:11px;">请保持此扩展开启，AAO 工具搜索时将自动工作。</p>
</body>
</html>
